<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stevie's Epic Task Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-1: #6b3aa6;
    --purple-2: #8a5cd1;
    --purple-3: #a78bda;
    --bg-soft: #f5f1fb;
    --bg-week: #ede5f9;
    --text: #2d2440;
    --text-muted: #6f6585;
    --border: #e3dcef;
    --border-strong: #cdc1e3;
    --green: #28a745;
    --red: #d54b4b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, #FF6B35 0%, #e91e8c 55%, #c0392b 100%);
    background-attachment: fixed;
    min-height: 100vh;
  }

  header.app-header {
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .header-title {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    text-shadow: 2px 3px 8px rgba(0,0,0,0.3);
  }

  .view-toggle { display: flex; gap: 6px; }
  .view-toggle button {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 7px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s;
  }
  .view-toggle button:hover { background: rgba(255,255,255,0.35); }
  .view-toggle button.active { background: white; color: #c0392b; border-color: white; }

  .container {
    max-width: 1500px;
    margin: 20px auto;
    background: rgba(255,255,255,0.97);
    border-radius: 16px;
    padding: 18px 24px 48px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }

  /* File status */
  .file-status {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; font-size: 13px; color: var(--text-muted);
  }
  .file-status .dot { width: 9px; height: 9px; border-radius: 50%; background: #c9c2da; flex-shrink: 0; }
  .file-status.connected .dot { background: var(--green); }
  .file-status.disconnected .dot { background: var(--red); }
  .file-status button {
    margin-left: auto; background: white; border: 1px solid var(--border-strong);
    color: var(--purple-1); padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-weight: 600; font-size: 12px;
  }
  .file-status button:hover { background: var(--bg-soft); }

  .reconnect-banner {
    background: #fff8e1; border: 1px solid #f4d27a; color: #6b4f0d;
    padding: 10px 16px; border-radius: 8px; margin-bottom: 16px;
    display: none; align-items: center; gap: 12px; font-size: 13px;
  }
  .reconnect-banner.show { display: flex; }
  .reconnect-banner button {
    background: var(--purple-1); color: white; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: 600;
  }

  .filename-pill {
    background: white; color: var(--purple-1); padding: 3px 10px;
    border-radius: 12px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border-strong);
  }

  /* Filters bar */
  .filters-bar {
    display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap;
    padding: 14px 18px;
    background: var(--bg-soft);
    border-radius: 10px 10px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
  }
  .filter-group label {
    display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--purple-1); margin-bottom: 4px; text-transform: uppercase;
  }
  .filter-group select, .filter-group input[type="text"] {
    padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: 6px;
    background: white; font-size: 13px; color: var(--text); min-width: 130px;
  }
  .filter-group.stretch { flex: 1; min-width: 120px; }
  .filter-group.stretch select,
  .filter-group.stretch input { width: 100%; }
  .filter-group.checkbox { display: flex; align-items: center; gap: 6px; padding-bottom: 8px; }
  .filter-group.checkbox input { width: auto; }
  .filter-group.checkbox label { margin: 0; text-transform: none; font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0; }

  .manage-btn {
    background: var(--purple-1); color: white; border: none;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; white-space: nowrap;
    margin-left: auto; margin-bottom: 1px;
  }
  .manage-btn:hover { background: var(--purple-2); }

  /* Table */
  .table-scroll-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
  }
  .task-table { background: white; min-width: 900px; }

  .grid-row {
    display: grid;
    grid-template-columns: 110px 100px 100px 1.6fr 140px 1.6fr 1.6fr 30px;
    gap: 10px; padding: 10px 16px;
    align-items: center; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .grid-row.header {
    background: var(--bg-soft); font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px; color: var(--purple-1); text-transform: uppercase;
    position: sticky; top: 0; z-index: 2;
  }
  .grid-row.add-row { background: #fafaff; }
  .grid-row.add-row.disabled { opacity: 0.5; pointer-events: none; }
  .grid-row.add-row input,
  .grid-row.add-row select,
  .grid-row.add-row textarea {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border-strong);
    border-radius: 6px; font-size: 13px; font-family: inherit; background: white; resize: none;
  }
  .grid-row.add-row textarea { min-height: 34px; }

  .add-btn {
    background: var(--purple-1); color: white; border: none;
    width: 30px; height: 30px; border-radius: 50%; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .add-btn:hover { background: var(--purple-2); }
  .add-btn:disabled { background: #c9c2da; cursor: not-allowed; }

  .week-divider {
    background: var(--bg-week); color: var(--purple-1); font-weight: 700;
    font-size: 13px; padding: 8px 16px; border-bottom: 1px solid var(--border);
  }

  .task-row .status-cell select {
    border: none; background: transparent; font-size: 13px;
    color: var(--text); cursor: pointer; padding: 3px 4px; width: 100%;
  }
  .task-row .status-cell .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle;
  }
  .task-row.complete { opacity: 0.6; }
  .task-row.complete .task-text,
  .task-row.complete .next-text { text-decoration: line-through; }

  .editable {
    padding: 4px 6px; border-radius: 4px; min-height: 24px;
    cursor: text; white-space: pre-wrap; word-break: break-word;
  }
  .editable:hover { background: var(--bg-soft); }
  .editable:focus { outline: 2px solid var(--purple-3); background: white; }
  .editable[data-empty="true"]::before { content: attr(data-placeholder); color: #b9b1ca; }

  .customer-chip {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .customer-chip.empty { background: #f0ecf7; color: #b9b1ca; font-style: italic; }
  .customer-chip select {
    background: transparent; border: none; font: inherit; color: inherit;
    cursor: pointer; appearance: none; -webkit-appearance: none; padding-right: 12px;
  }

  .next-text { line-height: 1.5; }
  .next-text .bullet-line { display: block; }
  .next-text .bullet-line::before { content: "• "; color: var(--purple-2); font-weight: bold; }

  .notes-text a { color: var(--purple-1); text-decoration: underline; word-break: break-all; }

  .delete-btn { background: none; border: none; color: #b9b1ca; font-size: 16px; cursor: pointer; padding: 0; }
  .delete-btn:hover { color: var(--red); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

  /* Customer color palette */
  .c-1 { background: #e6e3f7; color: #5b3aa6; }
  .c-2 { background: #d9eef7; color: #1f6c8c; }
  .c-3 { background: #fde6d9; color: #aa5722; }
  .c-4 { background: #ddf3df; color: #2d6e3a; }
  .c-5 { background: #fcdde7; color: #a3325a; }
  .c-6 { background: #d8efe9; color: #1f6e62; }
  .c-7 { background: #e0e2f7; color: #3b418f; }
  .c-8 { background: #efe9d6; color: #6e5a1f; }
  .c-9 { background: #f4dcef; color: #803680; }
  .c-10 { background: #d8e8f7; color: #2c5689; }

  /* Card view */
  .card-filters-bar {
    display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap;
    padding: 14px 18px; background: var(--bg-soft);
    border-radius: 10px; border: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }
  .customer-card {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; box-shadow: 0 2px 8px rgba(60,30,110,0.07);
  }
  .customer-card-header {
    padding: 12px 16px; font-weight: 700; font-size: 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .customer-card-header .badge {
    font-size: 11px; font-weight: 500; opacity: 0.8;
  }
  .card-task-row {
    padding: 8px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; display: flex; align-items: flex-start; gap: 8px;
  }
  .card-task-row:last-child { border-bottom: none; }
  .card-task-row .cdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .card-task-row .cbody { flex: 1; }
  .card-task-row .cname { font-weight: 500; }
  .card-task-row .cmeta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .card-task-row.complete .cname { text-decoration: line-through; opacity: 0.6; }
  .card-empty { padding: 14px 16px; font-size: 13px; color: var(--text-muted); font-style: italic; text-align: center; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white; border-radius: 16px; width: 460px;
    max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column;
    box-shadow: 0 16px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { margin: 0; font-size: 18px; }
  .modal-close {
    background: none; border: none; font-size: 22px; cursor: pointer;
    color: var(--text-muted); line-height: 1; padding: 2px 8px; border-radius: 4px;
  }
  .modal-close:hover { background: var(--bg-soft); }
  .modal-body { padding: 16px 24px; overflow-y: auto; flex: 1; }

  .customer-list-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .customer-list-item:last-child { border-bottom: none; }
  .customer-list-item .chip-preview {
    flex: 1; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 500;
  }
  .remove-cust-btn {
    background: none; border: none; color: #b9b1ca; font-size: 18px;
    cursor: pointer; padding: 2px 8px; border-radius: 4px; line-height: 1;
  }
  .remove-cust-btn:hover { color: var(--red); background: #fff0f0; }

  .add-customer-form {
    display: flex; gap: 8px; margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .add-customer-form input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border-strong);
    border-radius: 8px; font-size: 14px; font-family: inherit;
  }
  .add-customer-form button {
    background: var(--purple-1); color: white; border: none;
    padding: 8px 18px; border-radius: 8px; cursor: pointer;
    font-weight: 600; font-size: 13px;
  }
  .add-customer-form button:hover { background: var(--purple-2); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-title">Stevie's Epic Task Tracker 🌽</div>
  <div class="view-toggle">
    <button id="viewListBtn" class="active" onclick="setView('list')">☰ List</button>
    <button id="viewCardsBtn" onclick="setView('cards')">▦ Cards</button>
  </div>
</header>

<div class="container">

  <div class="file-status" id="fileStatus">
    <span class="dot"></span>
    <span id="fileLabel">No file connected — tasks save locally only</span>
    <button id="connectBtn">Connect file</button>
  </div>

  <div class="reconnect-banner" id="reconnectBanner">
    <span>🔌 Reconnect needed — click to grant permission to your saved task file.</span>
    <button id="reconnectBtn">Reconnect</button>
  </div>

  <!-- LIST VIEW -->
  <div id="listView">
    <div class="filters-bar">
      <div class="filter-group">
        <label>Customer / Area</label>
        <select id="filterCustomer"><option value="">All</option></select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="filterStatus">
          <option value="">All Statuses</option>
          <option value="Incomplete">Incomplete</option>
          <option value="Complete">Complete</option>
        </select>
      </div>
      <div class="filter-group stretch">
        <label>Owner</label>
        <input type="text" id="filterOwner" placeholder="Filter by owner...">
      </div>
      <div class="filter-group checkbox">
        <input type="checkbox" id="showCompleted">
        <label for="showCompleted">Show completed</label>
      </div>
      <button class="manage-btn" onclick="openManageModal()">⚙ Customers</button>
    </div>

    <div class="table-scroll-wrap">
      <div class="task-table">
        <div class="grid-row header">
          <div>Status</div><div>Due Date</div><div>Owner</div><div>Task</div>
          <div>Customer / Area</div><div>Next Steps</div><div>Notes</div><div></div>
        </div>
        <div class="grid-row add-row" id="addRow">
          <select id="newStatus"><option>Incomplete</option><option>Complete</option></select>
          <input type="date" id="newDue">
          <input type="text" id="newOwner" placeholder="Owner">
          <input type="text" id="newTask" placeholder="Task description">
          <select id="newCustomer"><option value="">-- Select --</option></select>
          <textarea id="newNext" placeholder="Next steps (one per line)"></textarea>
          <textarea id="newNotes" placeholder="Notes"></textarea>
          <button class="add-btn" id="addBtn">+</button>
        </div>
        <div id="taskList"></div>
      </div>
    </div>
  </div>

  <!-- CARD VIEW -->
  <div id="cardView" style="display:none;">
    <div class="card-filters-bar">
      <div class="filter-group">
        <label>Customer / Area</label>
        <select id="cardFilterCustomer"><option value="">All</option></select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="cardFilterStatus">
          <option value="">All Statuses</option>
          <option value="Incomplete">Incomplete</option>
          <option value="Complete">Complete</option>
        </select>
      </div>
      <div class="filter-group stretch">
        <label>Owner</label>
        <input type="text" id="cardFilterOwner" placeholder="Filter by owner...">
      </div>
      <div class="filter-group checkbox">
        <input type="checkbox" id="cardShowCompleted">
        <label for="cardShowCompleted">Show completed</label>
      </div>
      <button class="manage-btn" onclick="openManageModal()">⚙ Customers</button>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

</div>

<!-- Customer Management Modal -->
<div class="modal-overlay" id="manageModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Manage Customers / Areas</h2>
      <button class="modal-close" onclick="closeManageModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="customerListItems"></div>
      <div class="add-customer-form">
        <input type="text" id="newCustomerInput" placeholder="New customer or area name...">
        <button onclick="addCustomerFromModal()">Add</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_CUSTOMERS = [
  "Great River Health","UAMS Wisdom","UT Medicine","Integris Refuel",
  "Care Companion","Patient Education","MyChart Questionnaires","Other Internal"
];
const STORAGE_KEY = "stevies-task-tracker-v1";
const IDB_NAME = "stevies-task-tracker-db";
const IDB_STORE = "handles";
const IDB_KEY = "fileHandle";

let tasks = [];
let customers = [...DEFAULT_CUSTOMERS];
let fileHandle = null;
let needsReconnect = false;
let currentView = 'list';

// IndexedDB
function idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readonly");
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

// File I/O
async function verifyPermission(handle, write = true) {
  return (await handle.queryPermission({ mode: write ? "readwrite" : "read" })) === "granted";
}
async function requestPermission(handle, write = true) {
  const opts = { mode: write ? "readwrite" : "read" };
  if ((await handle.queryPermission(opts)) === "granted") return true;
  return (await handle.requestPermission(opts)) === "granted";
}

async function connectNewFile() {
  if (!window.showSaveFilePicker) {
    alert("Your browser doesn't support the File System Access API. Try Chrome or Edge.");
    return;
  }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: "stevies-task-tracker-data.json",
      types: [{ description: "JSON", accept: { "application/json": [".json"] } }]
    });
    fileHandle = handle;
    await idbSet(IDB_KEY, handle);
    await saveToFile();
    needsReconnect = false;
    updateFileStatus();
  } catch (err) { if (err.name !== "AbortError") console.error(err); }
}

async function saveToFile() {
  if (!fileHandle) return;
  try {
    if (!(await verifyPermission(fileHandle, true))) { needsReconnect = true; updateFileStatus(); return; }
    const data = JSON.stringify({ version: 1, savedAt: new Date().toISOString(), customers, tasks }, null, 2);
    const writable = await fileHandle.createWritable();
    await writable.write(data);
    await writable.close();
  } catch (err) { console.error("Save failed", err); }
}

async function loadFromFile() {
  if (!fileHandle) return false;
  try {
    if (!(await verifyPermission(fileHandle, false))) { needsReconnect = true; updateFileStatus(); return false; }
    const file = await fileHandle.getFile();
    const text = await file.text();
    if (!text.trim()) return false;
    const data = JSON.parse(text);
    if (Array.isArray(data.tasks)) tasks = data.tasks;
    if (Array.isArray(data.customers) && data.customers.length) customers = data.customers;
    return true;
  } catch (err) { console.error("Load failed", err); return false; }
}

async function tryRestoreHandle() {
  try {
    const handle = await idbGet(IDB_KEY);
    if (!handle) return;
    fileHandle = handle;
    if (await verifyPermission(handle, true)) { await loadFromFile(); needsReconnect = false; }
    else { needsReconnect = true; }
    updateFileStatus();
  } catch (err) { console.error("Restore failed", err); }
}

async function reconnect() {
  if (!fileHandle) return;
  if (await requestPermission(fileHandle, true)) {
    await loadFromFile(); needsReconnect = false; updateFileStatus(); render();
  }
}

function saveLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, customers })); }
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.tasks)) tasks = data.tasks;
    if (Array.isArray(data.customers) && data.customers.length) customers = data.customers;
  } catch {}
}
async function persist() { saveLocal(); await saveToFile(); }

// View toggle
function setView(v) {
  currentView = v;
  document.getElementById("listView").style.display = v === 'list' ? '' : 'none';
  document.getElementById("cardView").style.display = v === 'cards' ? '' : 'none';
  document.getElementById("viewListBtn").classList.toggle("active", v === 'list');
  document.getElementById("viewCardsBtn").classList.toggle("active", v === 'cards');
  if (v === 'cards') populateCardFilterDropdowns();
  render();
}

function updateFileStatus() {
  const el = document.getElementById("fileStatus");
  const label = document.getElementById("fileLabel");
  const banner = document.getElementById("reconnectBanner");
  const addRow = document.getElementById("addRow");
  el.classList.remove("connected", "disconnected");
  if (fileHandle && !needsReconnect) {
    el.classList.add("connected");
    label.innerHTML = `<span class="filename-pill">${fileHandle.name}</span> &nbsp; saved to your computer`;
    banner.classList.remove("show"); addRow.classList.remove("disabled");
  } else if (fileHandle && needsReconnect) {
    el.classList.add("disconnected");
    label.textContent = "File needs reconnect";
    banner.classList.add("show"); addRow.classList.add("disabled");
  } else {
    label.textContent = "No file connected — connect one to keep tasks across browser cache clears";
    banner.classList.remove("show"); addRow.classList.remove("disabled");
  }
}

// Helpers
function customerColorClass(name) {
  if (!name) return "empty";
  const idx = customers.indexOf(name);
  return "c-" + ((idx >= 0 ? idx : Math.abs(hashCode(name))) % 10 + 1);
}
function hashCode(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
  return h;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function autolink(text) {
  if (!text) return "";
  return escapeHtml(text).replace(/(https?:\/\/[^\s<]+|onenote:\/\/[^\s<]+|file:\/\/\/[^\s<]+|\\\\[^\s<]+)/g,
    url => `<a href="${url}" target="_blank">${url.length > 60 ? url.slice(0,57)+"..." : url}</a>`);
}
function bulletize(text) {
  if (!text) return "";
  return text.split(/\r?\n/).filter(Boolean)
    .map(line => `<span class="bullet-line">${escapeHtml(line)}</span>`).join("");
}
function fmtDate(d) {
  if (!d) return "";
  return new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function startOfWeek(d) {
  const date = new Date(d); const day = date.getDay();
  date.setDate(date.getDate() + (day === 0 ? -6 : 1 - day));
  date.setHours(0,0,0,0); return date;
}
function endOfWeek(d) { const e = startOfWeek(d); e.setDate(e.getDate() + 4); return e; }
function fmtRange(a, b) {
  const opt = { weekday: "long", month: "long", day: "numeric" };
  return `${a.toLocaleDateString("en-US", opt)} – ${b.toLocaleDateString("en-US", opt)}`;
}
function weekKey(dueStr) {
  if (!dueStr) return { key: "no-date", label: "No Due Date", sort: 9e15 };
  const due = new Date(dueStr + "T00:00:00");
  const ws = startOfWeek(due); const we = endOfWeek(due);
  const today = new Date(); today.setHours(0,0,0,0);
  const thisStart = startOfWeek(today);
  const diffDays = Math.round((ws - thisStart) / 86400000);
  let suffix = "";
  if (diffDays === 0) suffix = " (This Week)";
  else if (diffDays === -7) suffix = " (Last Week)";
  else if (diffDays === 7) suffix = " (Next Week)";
  else if (diffDays < 0) suffix = " (Past)";
  return { key: ws.toISOString().slice(0,10), label: fmtRange(ws, we) + suffix, sort: ws.getTime() };
}

function populateCustomerDropdowns() {
  const opts = customers.map(c => `<option>${escapeHtml(c)}</option>`).join("");
  document.getElementById("filterCustomer").innerHTML = '<option value="">All Customers</option>' + opts;
  document.getElementById("newCustomer").innerHTML = '<option value="">-- Select --</option>' + opts;
}
function populateCardFilterDropdowns() {
  const opts = customers.map(c => `<option>${escapeHtml(c)}</option>`).join("");
  document.getElementById("cardFilterCustomer").innerHTML = '<option value="">All Customers</option>' + opts;
}

function getListFiltered() {
  const fC = document.getElementById("filterCustomer").value;
  const fS = document.getElementById("filterStatus").value;
  const fO = document.getElementById("filterOwner").value.trim().toLowerCase();
  const showDone = document.getElementById("showCompleted").checked;
  return tasks.filter(t => {
    if (!showDone && t.status === "Complete" && !fS) return false;
    if (fS && t.status !== fS) return false;
    if (fC && t.customer !== fC) return false;
    if (fO && !(t.owner || "").toLowerCase().includes(fO)) return false;
    return true;
  });
}
function getCardFiltered() {
  const fC = document.getElementById("cardFilterCustomer").value;
  const fS = document.getElementById("cardFilterStatus").value;
  const fO = document.getElementById("cardFilterOwner").value.trim().toLowerCase();
  const showDone = document.getElementById("cardShowCompleted").checked;
  return tasks.filter(t => {
    if (!showDone && t.status === "Complete" && !fS) return false;
    if (fS && t.status !== fS) return false;
    if (fC && t.customer !== fC) return false;
    if (fO && !(t.owner || "").toLowerCase().includes(fO)) return false;
    return true;
  });
}

function render() {
  if (currentView === 'list') renderList();
  else renderCards();
}

function renderList() {
  const list = document.getElementById("taskList");
  const visible = getListFiltered().sort((a, b) => {
    const ad = a.due || "9999-12-31", bd = b.due || "9999-12-31";
    if (ad !== bd) return ad < bd ? -1 : 1;
    return (a.createdAt || 0) - (b.createdAt || 0);
  });

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty-state">No tasks yet. Add one above to get started.</div>`;
    return;
  }

  const groups = {};
  visible.forEach(t => {
    const wk = weekKey(t.due);
    if (!groups[wk.key]) groups[wk.key] = { ...wk, tasks: [] };
    groups[wk.key].tasks.push(t);
  });
  const ordered = Object.values(groups).sort((a, b) => a.sort - b.sort);

  list.innerHTML = ordered.map(g => `
    <div class="week-divider">${g.label}</div>
    ${g.tasks.map(taskRowHtml).join("")}
  `).join("");

  list.querySelectorAll(".task-row").forEach(row => {
    const id = row.dataset.id;
    row.querySelector(".status-select").addEventListener("change", e => updateTask(id, "status", e.target.value));
    row.querySelector(".due-input").addEventListener("change", e => updateTask(id, "due", e.target.value));
    row.querySelectorAll(".editable").forEach(el => {
      el.addEventListener("blur", () => updateTask(id, el.dataset.field, el.innerText));
      el.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey && el.dataset.field !== "next" && el.dataset.field !== "notes") {
          e.preventDefault(); el.blur();
        }
      });
    });
    row.querySelector(".customer-select").addEventListener("change", e => updateTask(id, "customer", e.target.value));
    row.querySelector(".delete-btn").addEventListener("click", () => deleteTask(id));
  });
}

function renderCards() {
  const grid = document.getElementById("cardGrid");
  const visible = getCardFiltered();
  const fC = document.getElementById("cardFilterCustomer").value;

  const groups = {};
  (fC ? [fC] : customers).forEach(c => { groups[c] = []; });
  visible.forEach(t => {
    const key = t.customer || "Unassigned";
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  grid.innerHTML = Object.entries(groups).map(([cust, ctasks]) => {
    const cls = customerColorClass(cust === "Unassigned" ? "" : cust);
    const incomplete = ctasks.filter(t => t.status !== "Complete").length;
    const sorted = [...ctasks].sort((a, b) => (a.due || "9999") < (b.due || "9999") ? -1 : 1);
    const items = sorted.length
      ? sorted.map(t => `
          <div class="card-task-row ${t.status === 'Complete' ? 'complete' : ''}">
            <div class="cdot" style="${t.status === 'Complete' ? 'background:var(--green)' : 'background:var(--purple-2)'}"></div>
            <div class="cbody">
              <div class="cname">${escapeHtml(t.task || '—')}</div>
              <div class="cmeta">${[t.due ? fmtDate(t.due) : '', t.owner ? 'Owner: ' + escapeHtml(t.owner) : ''].filter(Boolean).join(' · ')}</div>
            </div>
          </div>`).join("")
      : `<div class="card-empty">No tasks</div>`;

    return `
      <div class="customer-card">
        <div class="customer-card-header ${cls}">
          <span>${escapeHtml(cust)}</span>
          <span class="badge">${incomplete} open · ${ctasks.length} total</span>
        </div>
        <div>${items}</div>
      </div>`;
  }).join("") || `<div class="empty-state">No tasks to show.</div>`;
}

function taskRowHtml(t) {
  const cls = customerColorClass(t.customer);
  const dot = t.status === "Complete" ? "background:var(--green)" : "background:var(--purple-2)";
  const opts = customers.map(c => `<option ${c === t.customer ? "selected" : ""}>${escapeHtml(c)}</option>`).join("");
  return `
    <div class="grid-row task-row ${t.status === "Complete" ? "complete" : ""}" data-id="${t.id}">
      <div class="status-cell">
        <span class="status-dot" style="${dot}"></span>
        <select class="status-select">
          <option ${t.status === "Incomplete" ? "selected" : ""}>Incomplete</option>
          <option ${t.status === "Complete" ? "selected" : ""}>Complete</option>
        </select>
      </div>
      <div><input type="date" class="due-input" value="${t.due || ""}" style="border:1px solid var(--border);border-radius:4px;padding:3px 4px;font-size:12px;width:100%;"></div>
      <div class="editable" contenteditable="true" data-field="owner" data-empty="${!t.owner}" data-placeholder="—">${escapeHtml(t.owner || "")}</div>
      <div class="editable task-text" contenteditable="true" data-field="task" data-empty="${!t.task}" data-placeholder="Task...">${escapeHtml(t.task || "")}</div>
      <div><span class="customer-chip ${cls}"><select class="customer-select"><option value="">— none —</option>${opts}</select></span></div>
      <div class="editable next-text" contenteditable="true" data-field="next" data-empty="${!t.next}" data-placeholder="Next steps...">${t.next ? bulletize(t.next) : ""}</div>
      <div class="editable notes-text" contenteditable="true" data-field="notes" data-empty="${!t.notes}" data-placeholder="Notes...">${autolink(t.notes || "")}</div>
      <div><button class="delete-btn" title="Delete">×</button></div>
    </div>`;
}

// Task ops
function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

async function addTask() {
  const task = document.getElementById("newTask").value.trim();
  if (!task) { document.getElementById("newTask").focus(); return; }
  tasks.push({
    id: newId(),
    status: document.getElementById("newStatus").value || "Incomplete",
    due: document.getElementById("newDue").value,
    owner: document.getElementById("newOwner").value.trim(),
    task,
    customer: document.getElementById("newCustomer").value,
    next: document.getElementById("newNext").value.trim(),
    notes: document.getElementById("newNotes").value.trim(),
    createdAt: Date.now()
  });
  ["newDue","newOwner","newTask","newNext","newNotes"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("newCustomer").value = "";
  await persist(); render();
}

async function updateTask(id, field, value) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  if (["next","notes","owner","task"].includes(field)) value = (value || "").trim();
  if (t[field] === value) return;
  t[field] = value;
  await persist();
  if (["status","due","customer"].includes(field)) render();
}

async function deleteTask(id) {
  if (!confirm("Delete this task?")) return;
  tasks = tasks.filter(t => t.id !== id);
  await persist(); render();
}

// Customer management
function openManageModal() {
  renderCustomerList();
  document.getElementById("newCustomerInput").value = "";
  document.getElementById("manageModal").classList.add("show");
}
function closeManageModal() { document.getElementById("manageModal").classList.remove("show"); }

function renderCustomerList() {
  document.getElementById("customerListItems").innerHTML = customers.map((c, i) => `
    <div class="customer-list-item">
      <span class="chip-preview ${customerColorClass(c)}">${escapeHtml(c)}</span>
      <button class="remove-cust-btn" onclick="removeCustomer(${i})" title="Remove">×</button>
    </div>`).join("");
}

async function removeCustomer(index) {
  const name = customers[index];
  if (tasks.some(t => t.customer === name)) {
    if (!confirm(`"${name}" has tasks assigned to it. Remove from list anyway?\n\nExisting tasks will keep the name but it won't appear in dropdowns.`)) return;
  }
  customers.splice(index, 1);
  await persist();
  populateCustomerDropdowns();
  populateCardFilterDropdowns();
  renderCustomerList();
  render();
}

async function addCustomerFromModal() {
  const input = document.getElementById("newCustomerInput");
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  if (customers.includes(name)) { alert("That customer already exists."); return; }
  customers.push(name);
  await persist();
  populateCustomerDropdowns();
  populateCardFilterDropdowns();
  renderCustomerList();
  input.value = ""; input.focus();
}

// Event wiring
document.getElementById("connectBtn").addEventListener("click", connectNewFile);
document.getElementById("reconnectBtn").addEventListener("click", reconnect);
document.getElementById("addBtn").addEventListener("click", addTask);
document.getElementById("newTask").addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });
document.getElementById("newCustomerInput").addEventListener("keydown", e => { if (e.key === "Enter") addCustomerFromModal(); });
document.getElementById("manageModal").addEventListener("click", e => { if (e.target === document.getElementById("manageModal")) closeManageModal(); });

["filterCustomer","filterStatus","filterOwner","showCompleted"].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener("input", render); el.addEventListener("change", render);
});
["cardFilterCustomer","cardFilterStatus","cardFilterOwner","cardShowCompleted"].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener("input", render); el.addEventListener("change", render);
});

// Boot
(async function init() {
  loadLocal();
  populateCustomerDropdowns();
  populateCardFilterDropdowns();
  await tryRestoreHandle();
  populateCustomerDropdowns();
  populateCardFilterDropdowns();
  render();
})();
</script>
</body>
